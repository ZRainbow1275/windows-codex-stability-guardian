name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Package release
        shell: pwsh
        run: .\apps\guardian\scripts\package-release.ps1 -Version "${{ github.ref_name }}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ github.ref_name }}/guardian-${{ github.ref_name }}-windows-x64.zip
            dist/${{ github.ref_name }}/guardian.exe
            dist/${{ github.ref_name }}/SHA256SUMS.txt
